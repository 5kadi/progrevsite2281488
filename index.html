<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="PROGREV PWA APP" />
    
    <link rel="manifest" crossorigin="use-credentials" href="./manifest.webmanifest">
    <link rel="shortcut icon" href="public/favicon.ico" type="image/x-icon">
    <link rel="icon" href="public/favicon.ico" type="image/x-icon">
    <link rel="favicon-16x16" type="image/png" sizes="16x16" href="public/favicon.ico">
    <meta name="pwa-capable" content="yes">
    <link rel="stylesheet" href="styles.css">
    <title>ITree - ИТ-дерево навыков</title>
</head>
<body>
    
    <div class="app-container">
        <div class="header">
            <div class="user-card">
                <div class="avatar" id="avatarBtn">🌱</div>
                <div class="stats">
                    <div class="streak">🔥 <span id="streakCount">0</span> дней подряд</div>
                    <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpFill"></div></div>
                    <div id="xpText" style="font-size:12px; color:#94a3b8;">0 XP</div>
                </div>
            </div>
        </div>

        <div class="tree-grid" id="skillsGrid"></div>

        <div class="learning-panel" id="learningPanel">
            <div class="panel-header">
                <div class="panel-title" id="panelTitle">Обучение</div>
                <button class="close-panel" id="closePanel">✕</button>
            </div>
            <div id="lessonsContainer"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="dailyBtn">📅 Ежедневный бонус</button>
            <button class="btn btn-secondary" id="resetBtn">🔄 Сбросить прогресс</button>
        </div>
        <div class="footer">📚 Нажми на любой навык → выбери урок → изучи материал → получи XP!</div>
    </div>

    <div class="video-modal" id="videoModal">
        <div class="video-container">
            <button class="close-video" id="closeVideo">✕</button>
            <iframe class="video-frame" id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
    <script src="index.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(
                '/service-worker.js', {scope: '/progrevsite2281488/'}
            )
        }
    </script>
</body>
</html>
